{% extends 'base.html' %}

{% block title %}Delete Task - TaskFlow Pro{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Confirm Delete</h4>
                </div>
                <div class="card-body text-center">
                    <p>Are you sure you want to delete the task "{{ object.title }}"?</p>
                    <form method="post">
                        {% csrf_token %}
                        <a href="{% url 'tasks:detail' object.pk %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
